const SLABELS={"1":"Beginner","1.5":"Beginner+","2":"Basic","2.5":"Basic+","3":"Average","3.5":"Average+","4":"Good","4.5":"Good+","5":"Elite"};
function skillLabel(v){return SLABELS[String(v)]||String(v);}
let nid=200,nlid=20;

function SkillDots({value,color,size}){
  color=color||"#00ff88";size=size||9;
  return <div style={{display:"flex",gap:3,alignItems:"center"}}>
    {[1,2,3,4,5].map(function(i){
      var full=value>=i;
      var half=!full&&value>=i-0.5&&value<i;
      return <div key={i} style={{width:size,height:size,borderRadius:2,flexShrink:0,position:"relative",overflow:"hidden",
        background:"rgba(255,255,255,0.12)",boxShadow:full?"0 0 5px "+color:"none"}}>
        {full&&<div style={{position:"absolute",inset:0,background:color,borderRadius:2}}/>}
        {half&&<div style={{position:"absolute",top:0,left:0,width:"50%",height:"100%",background:color,borderRadius:"2px 0 0 2px"}}/>}
      </div>;
    })}
  </div>;
}

function Sheet({title,onClose,children}){
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",zIndex:400,display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick={onClose}>
    <div style={{background:"#111827",borderRadius:"18px 18px 0 0",maxHeight:"93vh",overflowY:"auto",animation:"slideUp 0.24s ease"}} onClick={function(e){e.stopPropagation();}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"20px 20px 14px",position:"sticky",top:0,background:"#111827",borderBottom:"1px solid rgba(255,255,255,0.08)",zIndex:1}}>
        <div style={{width:38,height:4,borderRadius:2,background:"rgba(255,255,255,0.18)",position:"absolute",top:8,left:"50%",transform:"translateX(-50%)"}}/>
        <h2 style={{fontSize:16,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"#fff",marginTop:6}}>{title}</h2>
        <button onClick={onClose} className="btn" style={{background:"rgba(255,255,255,0.09)",color:"rgba(255,255,255,0.65)",width:34,height:34,borderRadius:8,fontSize:17,display:"flex",alignItems:"center",justifyContent:"center",marginTop:6}}>&#10005;</button>
      </div>
      <div style={{padding:"20px 18px 12px"}}>{children}</div>
    </div>
  </div>;
}

function RulesSheet({sport,onClose}){
  var s=sport;
  var hasTypes=s.gameTypes&&s.gameTypes.length>1;
  var [selType,setSelType]=useState(s.gameTypes?(s.gameTypes.find(function(t){return t.mostPlayed;})||s.gameTypes[0]).id:null);
  var gt=hasTypes?s.gameTypes.find(function(t){return t.id===selType;})||s.gameTypes[0]:s.gameTypes&&s.gameTypes[0];
  var hasScoringOptions=gt&&gt.scoringOptions&&gt.scoringOptions.length>0;
  var [selScoring,setSelScoring]=useState(null);
  // When game type changes, reset scoring to the mostPlayed option
  var effectiveScoring=hasScoringOptions?(selScoring&&gt.scoringOptions.find(function(o){return o.id===selScoring;})||(gt.scoringOptions.find(function(o){return o.mostPlayed;})||gt.scoringOptions[0])):null;
  var r=gt?gt.rules:(s.rules||{});
  var scoringText=effectiveScoring?effectiveScoring.scoring:r.scoring;
  var durationText=effectiveScoring?("Win by "+effectiveScoring.winBy+" points. "+effectiveScoring.desc+"."):r.duration;

  function handleTypeChange(id){
    setSelType(id);
    setSelScoring(null); // reset scoring sub-selection when type changes
  }

  return <Sheet title={s.emoji+" "+s.label+" — Rules & Tips"} onClose={onClose}>
    <div style={{display:"flex",flexDirection:"column",gap:15,paddingBottom:24}}>

      {/* Game type selector */}
      {hasTypes&&<div>
        <div style={{fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(255,255,255,0.35)",fontWeight:700,marginBottom:9}}>Game Type</div>
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {s.gameTypes.map(function(t){
            var active=selType===t.id;
            return <button key={t.id} className="btn" onClick={function(){handleTypeChange(t.id);}} style={{
              padding:"11px 14px",borderRadius:10,textAlign:"left",fontSize:14,
              background:active?s.color+"18":"rgba(255,255,255,0.03)",
              border:active?"1px solid "+s.color+"55":"1px solid rgba(255,255,255,0.08)",
              color:active?s.color:"rgba(255,255,255,0.6)",
              display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <span style={{fontWeight:700,fontSize:15}}>{t.label}</span>
                  {t.mostPlayed&&<span style={{fontSize:9,fontWeight:800,letterSpacing:"0.08em",padding:"2px 7px",borderRadius:20,
                    background:"#fbbf2433",color:"#fbbf24",border:"1px solid #fbbf2455",textTransform:"uppercase"}}>Most Played</span>}
                </div>
                <div style={{fontSize:12,opacity:0.55,fontWeight:500,marginTop:2}}>{t.desc}</div>
              </div>
              {active&&<div style={{width:8,height:8,borderRadius:"50%",background:s.color,flexShrink:0,marginLeft:8}}/>}
            </button>;
          })}
        </div>
      </div>}

      {/* Scoring / Points target sub-selector (e.g. pickleball) */}
      {hasScoringOptions&&<div>
        <div style={{fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(255,255,255,0.35)",fontWeight:700,marginBottom:9}}>Points Target</div>
        <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
          {gt.scoringOptions.map(function(opt){
            var isEff=effectiveScoring&&effectiveScoring.id===opt.id;
            return <button key={opt.id} className="btn" onClick={function(){setSelScoring(opt.id);}} style={{
              flex:1,minWidth:0,padding:"10px 8px",borderRadius:9,textAlign:"center",
              background:isEff?s.color+"20":"rgba(255,255,255,0.04)",
              border:isEff?"1px solid "+s.color+"55":"1px solid rgba(255,255,255,0.09)",
              color:isEff?s.color:"rgba(255,255,255,0.55)"}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <span style={{fontSize:16,fontWeight:800}}>{opt.label}</span>
                {opt.mostPlayed&&<span style={{fontSize:8,fontWeight:800,letterSpacing:"0.07em",padding:"1px 6px",borderRadius:20,
                  background:"#fbbf2433",color:"#fbbf24",border:"1px solid #fbbf2444",textTransform:"uppercase"}}>Most Played</span>}
                {!opt.mostPlayed&&<span style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontWeight:500}}>{opt.desc}</span>}
              </div>
            </button>;
          })}
        </div>
        {effectiveScoring&&<div style={{marginTop:9,padding:"10px 13px",background:"rgba(255,255,255,0.03)",borderRadius:8,border:"1px solid rgba(255,255,255,0.07)"}}>
          <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.38)",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>How scoring works</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.7)",lineHeight:1.55}}>{scoringText}</div>
        </div>}
      </div>}

      {(hasTypes||hasScoringOptions)&&<div style={{height:1,background:"rgba(255,255,255,0.07)"}}/>}

      {/* Active game type header */}
      {gt&&<div style={{background:s.color+"16",border:"1px solid "+s.color+"30",borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
        <div style={{fontSize:20}}>{s.emoji}</div>
        <div>
          <div style={{fontSize:14,fontWeight:700,color:s.color,letterSpacing:"0.04em"}}>
            {gt.label}{effectiveScoring?" — "+effectiveScoring.label:""}

          {gt.desc&&<div style={{fontSize:11,color:"rgba(255,255,255,0.38)",marginTop:1}}>{gt.desc}</div>}
        </div>
      </div>}

      {/* Overview */}
      <div style={{background:"rgba(255,255,255,0.03)",borderRadius:12,padding:"13px 15px",borderLeft:"3px solid "+s.color}}>
        <div style={{fontSize:10,fontWeight:700,color:s.color,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>Overview</div>
        <div style={{fontSize:14,color:"rgba(255,255,255,0.7)",lineHeight:1.65}}>{r.overview}</div>
      </div>

      {/* Players / Duration / Scoring */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div style={{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"11px 13px"}}>
          <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.38)",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:5}}>Players</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.72)",lineHeight:1.5}}>{r.players}</div>
        </div>
        <div style={{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"11px 13px"}}>
          <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.38)",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:5}}>Duration / Target</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.72)",lineHeight:1.5}}>{durationText}</div>
        </div>
      </div>
      {!hasScoringOptions&&r.scoring&&<div style={{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"11px 13px"}}>
        <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.38)",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:5}}>Scoring</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.72)",lineHeight:1.5}}>{r.scoring}</div>
      </div>}

      {/* Key rules */}
      <div>
        <div style={{fontSize:11,fontWeight:700,color:s.color,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:9}}>Key Rules</div>
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {(r.key||[]).map(function(k,i){return <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"10px 12px"}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:s.color,marginTop:5,flexShrink:0}}/>
            <div style={{fontSize:14,color:"rgba(255,255,255,0.68)",lineHeight:1.55}}>{k}</div>
          </div>;})}
        </div>
      </div>

      {/* Tips */}
      <div>
        <div style={{fontSize:11,fontWeight:700,color:"#fbbf24",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:9}}>&#128161; Tips to Play Better</div>
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {(r.tips||[]).map(function(t,i){return <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",background:"rgba(251,191,36,0.05)",borderRadius:8,padding:"10px 12px",border:"1px solid rgba(251,191,36,0.1)"}}>
            <div style={{fontSize:12,color:"#fbbf24",flexShrink:0,marginTop:2}}>&#9650;</div>
            <div style={{fontSize:14,color:"rgba(255,255,255,0.68)",lineHeight:1.55}}>{t}</div>
          </div>;})}
        </div>
      </div>
    </div>
  </Sheet>;
}

// ─── DUPLICATE REVIEW COMPONENT ─────────────────────────────
function DuplicateReviewSheet({review,onConfirm,onClose,sport}){
  var PCOLS={GK:"#f59e0b",DEF:"#3b82f6",MID:"#10b981",FWD:"#ef4444",ANY:"#8b5cf6",
    PG:"#f59e0b",SG:"#3b82f6",SF:"#10b981",PF:"#ef4444",C:"#60a5fa",
    Setter:"#f59e0b",Libero:"#3b82f6",OH:"#10b981",MB:"#ef4444",OPP:"#a78bfa",
    Singles:"#60a5fa",Doubles:"#fbbf24"};

  // decision per player: "saved" | "new" | "skip"
  var initDecisions=review.pending.map(function(x){
    if(x.inSquad)return "skip";        // already in squad — default skip
    if(x.savedProfile)return "saved";  // has profile — default use saved
    return "new";
  });
  const [decisions,setDecisions]=useState(initDecisions);
  function setDecision(i,val){setDecisions(function(d){var n=d.slice();n[i]=val;return n;});}

  function handleConfirm(){
    var resolved=review.pending.map(function(x,i){
      var d=decisions[i];
      if(d==="skip")return {name:x.name,position:x.position,skill:x.skill,skip:true};
      var useSaved=d==="saved"&&x.savedProfile;
      return {
        name:x.name,
        position:useSaved?x.savedProfile.position:x.position,
        skill:useSaved?x.savedProfile.skill:x.skill,
        skip:false
      };
    });
    onConfirm(resolved);
  }

  var dupeCount=review.pending.filter(function(x){return x.savedProfile&&!x.inSquad;}).length;
  var squadDupeCount=review.pending.filter(function(x){return x.inSquad;}).length;
  var accentColor=sport?sport.color:"#00ff88";

  return <Sheet title="&#128269; Review Import" onClose={onClose}>
    <div style={{display:"flex",flexDirection:"column",gap:12,paddingBottom:16}}>

      {/* Summary */}
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {squadDupeCount>0&&<div style={{padding:"10px 13px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.22)",borderRadius:9}}>
          <div style={{fontSize:13,fontWeight:700,color:"#ef4444",marginBottom:2}}>&#128683; {squadDupeCount} already in squad</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>These players are already in your current squad. Skip or add again.</div>
        </div>}
        {dupeCount>0&&<div style={{padding:"10px 13px",background:"rgba(251,191,36,0.07)",border:"1px solid rgba(251,191,36,0.22)",borderRadius:9}}>
          <div style={{fontSize:13,fontWeight:700,color:"#fbbf24",marginBottom:2}}>&#128190; {dupeCount} profile{dupeCount!==1?"s":""} found</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>Saved skill ratings found. Choose which to use.</div>
        </div>}
      </div>

      {/* Bulk actions */}
      {(dupeCount>1||squadDupeCount>1)&&<div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
        {dupeCount>1&&<>
          <button className="btn" onClick={function(){setDecisions(review.pending.map(function(x){return x.inSquad?"skip":x.savedProfile?"saved":"new";}));}} style={{

          <button className="btn" onClick={function(){setDecisions(review.pending.map(function(x){return x.inSquad?"skip":"new";}));}} style={{
            flex:1,padding:"8px",borderRadius:7,fontSize:12,background:"rgba(96,165,250,0.08)",color:"#60a5fa",border:"1px solid rgba(96,165,250,0.2)"}}>&#128221; All Default</button>
        </>}
        {squadDupeCount>1&&<button className="btn" onClick={function(){setDecisions(review.pending.map(function(x){return x.inSquad?"skip":decisions[review.pending.indexOf(x)];}));}} style={{
          flex:1,padding:"8px",borderRadius:7,fontSize:12,background:"rgba(239,68,68,0.08)",color:"#ef4444",border:"1px solid rgba(239,68,68,0.2)"}}>&#128683; Skip All In Squad</button>}

            {/* Name row */}
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",
              background:isSquadDupe?"rgba(239,68,68,0.06)":hasProfile?"rgba(251,191,36,0.05)":"rgba(255,255,255,0.02)"}}>
              <span style={{fontSize:10,color:"rgba(255,255,255,0.22)",minWidth:18,textAlign:"right"}}>{i+1}</span>
              <span style={{flex:1,fontSize:14,fontWeight:700,
                color:isSquadDupe?"#ef4444":hasProfile?"#fbbf24":"rgba(255,255,255,0.8)"}}>{x.name}</span>
              {isSquadDupe&&<span style={{fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:20,
                background:"rgba(239,68,68,0.15)",color:"#ef4444",border:"1px solid rgba(239,68,68,0.3)",whiteSpace:"nowrap"}}>In Squad</span>}
              {hasProfile&&<span style={{fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:20,
                background:"rgba(251,191,36,0.15)",color:"#fbbf24",border:"1px solid rgba(251,191,36,0.3)",whiteSpace:"nowrap"}}>&#128190; Profile</span>}
            </div>

            {/* Squad duplicate options */}
            {isSquadDupe&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:0,borderTop:"1px solid rgba(255,255,255,0.06)"}}>
              <button className="btn" onClick={function(){setDecision(i,"skip");}} style={{
                padding:"10px 8px",borderRadius:0,borderRight:"1px solid rgba(255,255,255,0.06)",
                background:d==="skip"?"rgba(239,68,68,0.12)":"rgba(255,255,255,0.02)",
                color:d==="skip"?"#ef4444":"rgba(255,255,255,0.4)",border:"none",fontSize:12,fontWeight:700}}>
                {d==="skip"?"&#10003; ":""}Skip (already in squad)
              </button>
              <button className="btn" onClick={function(){setDecision(i,"new");}} style={{
                padding:"10px 8px",borderRadius:0,
                background:d==="new"?"rgba(96,165,250,0.12)":"rgba(255,255,255,0.02)",
                color:d==="new"?"#60a5fa":"rgba(255,255,255,0.4)",border:"none",fontSize:12,fontWeight:700}}>
                {d==="new"?"&#10003; ":""}Add anyway
              </button>
            </div>}

            {/* Profile match options */}
            {hasProfile&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:0,borderTop:"1px solid rgba(255,255,255,0.06)"}}>
              <button className="btn" onClick={function(){setDecision(i,"saved");}} style={{
                padding:"11px 8px",borderRadius:0,borderRight:"1px solid rgba(255,255,255,0.06)",
                background:d==="saved"?"rgba(0,255,136,0.11)":"rgba(255,255,255,0.02)",
                color:d==="saved"?"#00ff88":"rgba(255,255,255,0.4)",border:"none"}}>
                <div style={{fontSize:11,fontWeight:700,marginBottom:3}}>{d==="saved"?"&#10003; ":""}Saved Profile</div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                  <span style={{fontSize:8,fontWeight:800,padding:"1px 4px",borderRadius:3,
                    background:(PCOLS[x.savedProfile.position]||"#8b5cf6")+"33",
                    color:PCOLS[x.savedProfile.position]||"#8b5cf6"}}>{x.savedProfile.position}</span>
                  <SkillDots value={x.savedProfile.skill} size={7} color="#00ff88"/>
                  <span style={{fontSize:12,fontWeight:800,color:"#00ff88"}}>{x.savedProfile.skill}</span>
                </div>
              </button>
              <button className="btn" onClick={function(){setDecision(i,"new");}} style={{
                padding:"11px 8px",borderRadius:0,
                background:d==="new"?"rgba(96,165,250,0.11)":"rgba(255,255,255,0.02)",
                color:d==="new"?"#60a5fa":"rgba(255,255,255,0.4)",border:"none"}}>
                <div style={{fontSize:11,fontWeight:700,marginBottom:3}}>{d==="new"?"&#10003; ":""}Import Default</div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
                  <span style={{fontSize:8,fontWeight:800,padding:"1px 4px",borderRadius:3,
                    background:(PCOLS[x.position]||"#8b5cf6")+"33",
                    color:PCOLS[x.position]||"#8b5cf6"}}>{x.position}</span>
                  <SkillDots value={x.skill} size={7} color="#60a5fa"/>
                  <span style={{fontSize:12,fontWeight:800,color:"#60a5fa"}}>{x.skill}</span>
                </div>
              </button>
            </div>}

            {/* Clean new player — no action needed */}
            {!isSquadDupe&&!hasProfile&&<div style={{padding:"7px 12px",borderTop:"1px solid rgba(255,255,255,0.05)",
              display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.02)"}}>
              <span style={{fontSize:10,color:"rgba(255,255,255,0.22)"}}>New —</span>

              <SkillDots value={x.skill} size={7} color="rgba(255,255,255,0.3)"/>

            </div>}
          </div>;
        })}
      </div>

      <button className="btn" onClick={handleConfirm} style={{
        padding:"15px",borderRadius:11,fontSize:15,fontWeight:800,marginTop:4,
        background:accentColor,color:"#080c10",border:"none",
        boxShadow:"0 0 20px "+accentColor+"44"}}>
        &#10003; CONFIRM IMPORT

  </Sheet>;
}

// ─── MAIN APP ────────────────────────────────────────────────
const STORAGE_KEY="team-selector-v1";
const PROFILE_DB_KEY="team-selector-profiles-v1";

function loadSaved(){
  try{var raw=localStorage.getItem(STORAGE_KEY);if(raw)return JSON.parse(raw);}catch(e){}
  return null;
}

// Profile DB — separate from squad lists, persists through Clear all
function loadProfileDB(){
  try{var raw=localStorage.getItem(PROFILE_DB_KEY);if(raw)return JSON.parse(raw);}catch(e){}
  return {}; // {normalisedName: {name, position, skill, updatedAt}}
}
function saveProfileDB(db){
  try{localStorage.setItem(PROFILE_DB_KEY,JSON.stringify(db));}catch(e){}
}
function normaliseName(name){
  // Collapse multiple spaces, trim, lowercase — makes matching robust
  return (name||"").trim().replace(/\s+/g," ").toLowerCase();
}
function upsertProfile(db,player){
  if(!player||!player.name||!player.name.trim())return db;
  var key=normaliseName(player.name);
  db[key]={name:player.name.trim(),position:player.position||"ANY",skill:player.skill||3,updatedAt:Date.now()};
  return db;
}
function lookupProfile(db,name){
  if(!db||!name)return null;
  return db[normaliseName(name)]||null;
}

function App(){
  var saved=loadSaved();
  const [profileDB,setProfileDB]=useState(loadProfileDB);
  const [saveStatus,setSaveStatus]=useState("saved"); // "saved"|"saving"|"error"

  const [sportId,setSportId]=useState(saved?saved.sportId:"football");
  const [showSportPicker,setShowSportPicker]=useState(saved?false:true);
  const [lists,setLists]=useState(saved&&saved.lists?saved.lists:[{id:1,name:"My Squad",players:[]}]);
  const [activeListId,setActiveListId]=useState(saved?saved.activeListId:1);
  const [playersAside,setPlayersAside]=useState(saved?saved.playersAside:11);
  const [numTeams,setNumTeams]=useState(saved?saved.numTeams:2);
  const [customNumTeams,setCustomNumTeams]=useState("");
  const [teams,setTeams]=useState(null);
  const [sheet,setSheet]=useState(null);
  const [form,setForm]=useState({name:"",position:"ANY",skill:3,editId:null});
  const [bulkText,setBulkText]=useState("");
  const [bulkPos,setBulkPos]=useState("ANY");
  const [bulkSkill,setBulkSkill]=useState(3);
  const [newListName,setNewListName]=useState("");
  const [flash,setFlash]=useState(null);
  const [editingTeams,setEditingTeams]=useState(false);
  const [exportText,setExportText]=useState("");
  const [showExport,setShowExport]=useState(false);
  const [moveModal,setMoveModal]=useState(null);
  const [tpForm,setTpForm]=useState(null);
  const [view,setView]=useState("squad");
  const [showRules,setShowRules]=useState(false);
  const [jerseySheet,setJerseySheet]=useState(null);
  const [showProfiles,setShowProfiles]=useState(false);
  const dragRef=useRef({player:null,fromTeam:null});
  const [dragOver,setDragOver]=useState(null);

  // Auto-save to localStorage whenever key state changes
  const saveTimeout=useRef(null);
  function scheduleSave(newLists,newSportId,newActiveListId,newPlayersAside,newNumTeams){
    setSaveStatus("saving");
    clearTimeout(saveTimeout.current);
    saveTimeout.current=setTimeout(function(){
      try{
        localStorage.setItem(STORAGE_KEY,JSON.stringify({
          lists:newLists,sportId:newSportId,activeListId:newActiveListId,
          playersAside:newPlayersAside,numTeams:newNumTeams,savedAt:Date.now()
        }));
        setSaveStatus("saved");
      }catch(e){setSaveStatus("error");}
    },400);
  }

  const {useEffect}=React;

  // Seed profile DB from ALL players in ALL lists on startup and whenever lists change
  // This ensures existing players are always in the DB even if added before this feature
  useEffect(function(){
    setProfileDB(function(db){
      var updated=Object.assign({},db);
      var changed=false;
      lists.forEach(function(l){
        (l.players||[]).forEach(function(p){
          var key=normaliseName(p.name);
          // Only upsert if not already in DB (don't overwrite manually edited profiles)
          if(!updated[key]){
            upsertProfile(updated,p);
            changed=true;
          }
        });
      });
      if(changed){
        try{localStorage.setItem(PROFILE_DB_KEY,JSON.stringify(updated));}catch(e){}
        return updated;
      }
      return db;
    });
  },[lists]);

  // Wrap state setters to also trigger save
  function setListsAndSave(fn){
    setLists(function(prev){
      var next=typeof fn==="function"?fn(prev):fn;
      scheduleSave(next,sportId,activeListId,playersAside,numTeams);
      return next;
    });
  }

  // Sync one or more players into the persistent profile DB
  function syncToProfileDB(playersArr){
    setProfileDB(function(db){
      var updated=Object.assign({},db);
      playersArr.forEach(function(p){if(p&&p.name)upsertProfile(updated,p);});
      try{
        localStorage.setItem(PROFILE_DB_KEY,JSON.stringify(updated));
        setSaveStatus("saved");
      }catch(e){setSaveStatus("error");}
      return updated;
    });
  }

  var sport=SPORTS[sportId]||SPORTS.football;
  var accentColor=sport.color;

  function selectSport(sid){
    var s=SPORTS[sid];
    setSportId(sid);
    setPlayersAside(s.defaultAside);
    setNumTeams(s.defaultTeams);
    setTeams(null);setEditingTeams(false);setShowExport(false);
    setShowSportPicker(false);setView("squad");
    scheduleSave(lists,sid,activeListId,s.defaultAside,s.defaultTeams);
    flash2("Sport set to "+s.label+"!");
  }

  function flash2(msg,type){setFlash({msg,type:type||"ok"});setTimeout(function(){setFlash(null);},2200);}

  // Bulletproof active list — never undefined, always has a players array
  var safeList=lists&&lists.length>0?lists:([{id:1,name:"My Squad",players:[]}]);
  var activeList=safeList.find(function(l){return l.id===activeListId;})||safeList[0];
  var players=(activeList&&activeList.players)||[];

  function updPlayers(fn){
    setListsAndSave(function(ls){return ls.map(function(l){return l.id===activeListId?Object.assign({},l,{players:fn(l.players)}):l;});});
    setTeams(null);setEditingTeams(false);setShowExport(false);
  }
  function savePlayer(){
    if(!form.name.trim())return;
    var playerData={name:form.name.trim(),position:form.position,skill:form.skill};
    // Block duplicate names in the current squad (except when editing existing player)
    var normNew=normaliseName(playerData.name);
    var isDupe=players.some(function(p){
      return normaliseName(p.name)===normNew&&p.id!==form.editId;
    });
    if(isDupe){flash2(playerData.name+" is already in the squad!","err");return;}
    if(form.editId!=null){
      updPlayers(function(ps){return ps.map(function(p){return p.id===form.editId?Object.assign({},p,playerData):p;});});
      flash2("Updated!");
    }else{
      updPlayers(function(ps){return ps.concat([Object.assign({id:nid++},playerData)]);});
      flash2("Player added!");
    }
    syncToProfileDB([playerData]);
    setForm({name:"",position:"ANY",skill:3,editId:null});setSheet(null);
  }
  function removePlayer(id){updPlayers(function(ps){return ps.filter(function(p){return p.id!==id;});});}
  function startEdit(pl){setForm({name:pl.name,position:pl.position,skill:pl.skill,editId:pl.id});setSheet("editPlayer");}

  // Scan current squad for duplicate names and remove extras (keep first occurrence)
  function cleanDuplicates(){
    var seen={};var removed=0;
    updPlayers(function(ps){
      return ps.filter(function(p){
        var key=normaliseName(p.name);
        if(seen[key]){removed++;return false;}
        seen[key]=true;return true;
      });
    });
    if(removed>0)flash2(removed+" duplicate"+(removed>1?"s":"")+" removed!");
    else flash2("No duplicates found ✓");
  }

  const [duplicateReview,setDuplicateReview]=useState(null);

  function parseBulk(){
    var parsed=bulkText.split("\n").map(function(l){return l.trim();}).filter(Boolean)
      .map(function(l){return l.replace(/^\d+[\.\)\-\s]+/,"").trim();}).filter(Boolean);
    if(!parsed.length)return;

    // Dedupe within the import list itself (keep first occurrence of each name)
    var seenInList={};
    var deduped=[];
    parsed.forEach(function(name){
      var key=normaliseName(name);
      if(!seenInList[key]){seenInList[key]=true;deduped.push(name);}
    });
    var removedFromList=parsed.length-deduped.length;

    var withMatches=deduped.map(function(name){
      var savedProfile=lookupProfile(profileDB,name);
      var inSquad=players.some(function(p){return normaliseName(p.name)===normaliseName(name);});
      return {name:name,position:savedProfile?savedProfile.position:bulkPos,skill:savedProfile?savedProfile.skill:bulkSkill,savedProfile:savedProfile,inSquad:inSquad};
    });

    var hasAnything=withMatches.some(function(x){return x.savedProfile||x.inSquad;});
    if(removedFromList>0)flash2(removedFromList+" duplicate"+(removedFromList>1?"s":"")+" removed from import list");

    if(hasAnything){
      setDuplicateReview({pending:withMatches,bulkPos:bulkPos,bulkSkill:bulkSkill,removedFromList:removedFromList});
      setSheet("duplicateReview");
    }else{
      updPlayers(function(ps){return ps.concat(withMatches.map(function(x){return {id:nid++,name:x.name,position:x.position,skill:x.skill};}));});
      syncToProfileDB(withMatches);
      flash2(deduped.length+" players imported!"+(removedFromList>0?" ("+removedFromList+" dupes removed)":""));
      setBulkText("");setSheet(null);
    }
  }

  function confirmDuplicateReview(decisions){
    // decisions = array of {name, position, skill, skip}
    var toAdd=decisions.filter(function(x){return !x.skip;});
    updPlayers(function(ps){return ps.concat(toAdd.map(function(x){return {id:nid++,name:x.name,position:x.position,skill:x.skill};}));});
    syncToProfileDB(toAdd);
    var skipped=decisions.filter(function(x){return x.skip;}).length;
    flash2(toAdd.length+" added"+(skipped?" · "+skipped+" skipped":"")+"!");
    setBulkText("");setDuplicateReview(null);setSheet(null);
  }
  function createList(){
    if(!newListName.trim())return;
    var id=nlid++;
    setListsAndSave(function(ls){return ls.concat([{id:id,name:newListName.trim(),players:[]}]);});
    setActiveListId(id);setNewListName("");setSheet(null);setTeams(null);flash2("List created!");
  }
  function renameList(){
    if(!newListName.trim())return;
    setListsAndSave(function(ls){return ls.map(function(l){return l.id===activeListId?Object.assign({},l,{name:newListName.trim()}):l;});});
    setNewListName("");setSheet(null);flash2("Renamed!");
  }
  function deleteList(id){
    // Always keep at least one list
    var r=lists.filter(function(l){return l.id!==id;});
    if(r.length===0){
      // Safety net — never allow empty lists array
      r=[{id:nlid++,name:"My Squad",players:[]}];
    }
    // If we deleted the active list, switch to first remaining
    var newActiveId=id===activeListId?r[0].id:activeListId;
    setListsAndSave(r);
    setActiveListId(newActiveId);
    setTeams(null);setEditingTeams(false);setShowExport(false);
  }

  var effectiveNumTeams=numTeams;
  var KEY_POSITIONS=["GK","Setter","Libero","PG"];

  function generateTeams(){
    if(players.length<effectiveNumTeams)return;
    var step=Math.max(1,Math.floor(JERSEY_PRESETS.length/effectiveNumTeams));
    var result=[];
    for(var i=0;i<effectiveNumTeams;i++){
      var prevName=teams&&teams[i]?teams[i].name:"Team "+(i+1);
      var prevJersey=teams&&teams[i]&&teams[i].jersey?teams[i].jersey:JERSEY_PRESETS[(i*step)%JERSEY_PRESETS.length].hex;
      result.push({name:prevName,color:TCOLS[i%TCOLS.length],jersey:prevJersey,players:[]});
    }

    function teamSkill(t){
      return t.players.reduce(function(s,p){return s+p.skill;},0);
    }

    // Assign a player to the team with lowest skill total
    function assignToWeakest(p){
      var minIdx=0;var minS=teamSkill(result[0]);
      for(var j=1;j<effectiveNumTeams;j++){
        var ts=teamSkill(result[j]);
        if(ts<minS){minS=ts;minIdx=j;}
      }
      result[minIdx].players.push(p);
    }

    // Step 1 — for EACH key position, distribute that group separately
    // e.g. 3 GKs across 2 teams → GK1(best)→weakest team, GK2→weakest team, GK3→weakest team
    // This guarantees no team gets 2 GKs unless there are more GKs than teams
    var remaining=players.map(function(p){return Object.assign({},p);});
    KEY_POSITIONS.forEach(function(pos){
      var posPlayers=remaining.filter(function(p){return p.position===pos;});
      remaining=remaining.filter(function(p){return p.position!==pos;});
      // Sort by skill descending, then distribute one at a time to weakest team
      posPlayers.sort(function(a,b){return b.skill-a.skill;});
      posPlayers.forEach(function(p){assignToWeakest(p);});
    });

    // Step 2 — distribute remaining players to weakest team (greedy by skill)
    remaining.sort(function(a,b){return b.skill-a.skill;});
    remaining.forEach(function(p){assignToWeakest(p);});

    setTeams(result);setEditingTeams(false);setShowExport(false);setView("teams");flash2("Teams generated!");
  }

  function updTeams(fn){setTeams(function(ts){return fn(ts.map(function(t){return Object.assign({},t,{players:t.players.slice()});}));});}
  function changeJersey(ti,hex){updTeams(function(ts){ts[ti].jersey=hex;return ts;});}

  // Reshuffle — keep same teams/jerseys but randomly redistribute players
  function reshuffleTeams(){
    if(!teams)return;
    var allPlayers=teams.reduce(function(a,t){return a.concat(t.players);},[]); 
    // Fisher-Yates shuffle
    for(var i=allPlayers.length-1;i>0;i--){
      var j=Math.floor(Math.random()*(i+1));
      var tmp=allPlayers[i];allPlayers[i]=allPlayers[j];allPlayers[j]=tmp;
    }
    updTeams(function(ts){
      ts.forEach(function(t){t.players=[];});
      allPlayers.forEach(function(p,i){
        ts[i%ts.length].players.push(Object.assign({},p));
      });
      return ts;
    });
    flash2("Teams reshuffled!");
  }
  function removeFromTeam(ti,pid){updTeams(function(ts){ts[ti].players=ts[ti].players.filter(function(p){return p.id!==pid;});return ts;});}
  function addToTeam(ti,player){updTeams(function(ts){ts[ti].players=ts[ti].players.concat([Object.assign({},player)]);return ts;});}
  function movePlayer(from,to,pid){
    updTeams(function(ts){
      var p=ts[from].players.find(function(x){return x.id===pid;});
      if(!p)return ts;
      ts[from].players=ts[from].players.filter(function(x){return x.id!==pid;});
      ts[to].players=ts[to].players.concat([Object.assign({},p)]);
      return ts;
    });flash2("Moved!");
  }
  function renameTeam(ti,name){updTeams(function(ts){ts[ti].name=name;return ts;});}
  function editTp(ti,pl){setTpForm({teamIdx:ti,playerId:pl.id,form:{name:pl.name,position:pl.position,skill:pl.skill}});setSheet("editTp");}
  function saveTp(){
    if(!tpForm)return;
    var ti=tpForm.teamIdx,pid=tpForm.playerId,f=tpForm.form;
    updTeams(function(ts){ts[ti].players=ts[ti].players.map(function(p){return p.id===pid?Object.assign({},p,f):p;});return ts;});
    setListsAndSave(function(ls){return ls.map(function(l){return l.id===activeListId?Object.assign({},l,{players:l.players.map(function(p){return p.id===pid?Object.assign({},p,f):p;})}):l;});});
    syncToProfileDB([f]);
    flash2("Updated!");setTpForm(null);setSheet(null);
  }
  function buildExport(){
    if(!teams)return"";
    var used=new Set(teams.reduce(function(a,t){return a.concat(t.players.map(function(p){return p.id;}));},[]));
    var benchP=players.filter(function(p){return !used.has(p.id);});
    // Map hex colours to closest emoji colour square
    var colourEmojis={
      "#e63946":"🟥","#1d7ae0":"🟦","#2dc653":"🟩","#f4d03f":"🟨",
      "#f97316":"🟧","#9b59b6":"🟪","#f0f0f0":"⬜","#1a1a2e":"⬛",
      "#e91e8c":"🟥","#00bcd4":"🟦","#800000":"🟥","#001f5b":"🟦",
      "#b5e61d":"🟩","#56cfe1":"🟦","#ffd700":"🟨","#8b4513":"🟫"
    };
    function getEmoji(hex){return hex?(colourEmojis[hex]||"🔵"):"⚪";}
    var out="";
    teams.forEach(function(t){
      var jerseyName=t.jersey?(JERSEY_PRESETS.find(function(p){return p.hex===t.jersey;})||{name:t.jersey}).name:"";
      var em=getEmoji(t.jersey);
      out+=em+" "+t.name+(jerseyName?" — "+jerseyName+" Jersey":"")+"\n";
      t.players.forEach(function(p,i){out+="  "+(i+1)+". "+p.name+"\n";});
      out+="\n";
    });
    if(benchP.length){
      out+="🔄 Bench\n";
      benchP.forEach(function(p,i){out+="  "+(i+1)+". "+p.name+"\n";});
    }
    return out.trim();
  }
  function openExport(){setExportText(buildExport());setShowExport(true);}
  function copyClip(){
    if(navigator.clipboard){navigator.clipboard.writeText(exportText).then(function(){flash2("Copied!");}).catch(function(){flash2("Failed","err");});}
    else{flash2("Not supported","err");}
  }

  var canGen=players.length>=effectiveNumTeams;
  var usedSet=teams?new Set(teams.reduce(function(a,t){return a.concat(t.players.map(function(p){return p.id;}));},[])):new Set();
  var bench=teams?players.filter(function(p){return !usedSet.has(p.id);}):[];

  // position colours lookup
  var PCOLS={GK:"#f59e0b",DEF:"#3b82f6",MID:"#10b981",FWD:"#ef4444",ANY:"#8b5cf6",
    PG:"#f59e0b",SG:"#3b82f6",SF:"#10b981",PF:"#ef4444",C:"#60a5fa",
    Setter:"#f59e0b",Libero:"#3b82f6",OH:"#10b981",MB:"#ef4444",OPP:"#a78bfa",
    Singles:"#60a5fa",Doubles:"#fbbf24"};

  // ─── SPORT PICKER SCREEN ───────────────────────────────────
  if(showSportPicker){
    return <div style={{minHeight:"100vh",background:"#080c10",padding:"0 0 40px"}}>
      {flash&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:999,padding:"11px 22px",borderRadius:30,fontWeight:800,fontSize:14,whiteSpace:"nowrap",
        background:"#00ff88",color:"#080c10",animation:"flashA 2.2s ease forwards",pointerEvents:"none",boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}>{flash.msg}</div>}
      <div style={{background:"linear-gradient(135deg,#0d1f0f,#080c10 60%,#0a0d1a)",borderBottom:"1px solid rgba(255,255,255,0.08)",padding:"22px 18px 18px"}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",letterSpacing:"0.14em",textTransform:"uppercase",marginBottom:4}}>Team Selector</div>
        <h1 style={{fontSize:26,fontWeight:700,color:"#fff",letterSpacing:"0.05em"}}>Choose <span style={{color:"#00ff88"}}>Your Sport</span></h1>
        <div style={{fontSize:14,color:"rgba(255,255,255,0.35)",marginTop:4}}>Settings will adjust automatically</div>
      </div>
      <div style={{padding:"18px 14px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {Object.values(SPORTS).map(function(s){return <button key={s.id} className="btn sport-card" onClick={function(){selectSport(s.id);}} style={{
          padding:"20px 14px",borderRadius:14,background:sportId===s.id?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.03)",
          border:sportId===s.id?"1px solid "+s.color+"66":"1px solid rgba(255,255,255,0.08)",
          textAlign:"left",display:"flex",flexDirection:"column",gap:8,transition:"all 0.18s",
          boxShadow:sportId===s.id?"0 0 20px "+s.color+"22":"none"}}>
          <div style={{fontSize:32}}>{s.emoji}</div>
          <div style={{fontSize:16,fontWeight:700,color:sportId===s.id?s.color:"rgba(255,255,255,0.8)",letterSpacing:"0.03em"}}>{s.label}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",fontWeight:500}}>{s.defaultAside}v{s.defaultAside} &bull; {Object.keys(SPORTS).indexOf(s.id)<4?"Team":"Individual/Pair"}</div>
        </button>;})}
      </div>
    </div>;
  }

  // ─── MAIN APP SCREEN ──────────────────────────────────────
  return <div style={{minHeight:"100vh",background:"#080c10",paddingBottom:90}}>

    {flash&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:999,padding:"11px 22px",borderRadius:30,fontWeight:800,fontSize:14,whiteSpace:"nowrap",
      background:flash.type==="err"?"#ef4444":"#00ff88",color:"#080c10",animation:"flashA 2.2s ease forwards",pointerEvents:"none",boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}>{flash.msg}</div>}

    {/* HEADER */}
    <div style={{background:"linear-gradient(135deg,#0a1a0d,#080c10 55%,#0a0d1a)",borderBottom:"1px solid rgba(255,255,255,0.08)",padding:"14px 16px 12px",position:"sticky",top:0,zIndex:100}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button className="btn" onClick={function(){setShowSportPicker(true);}} style={{
            background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,
            padding:"6px 10px",fontSize:20,lineHeight:1}}>{sport.emoji}</button>
          <div>
            <div style={{fontSize:18,fontWeight:700,letterSpacing:"0.06em",color:"#fff",textTransform:"uppercase",lineHeight:1}}>
              <span style={{color:accentColor}}>{sport.label}</span> Selector
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.28)",letterSpacing:"0.1em",textTransform:"uppercase"}}>
                {playersAside}v{playersAside} &bull; {effectiveNumTeams} teams
              </div>
              {/* Save status pill */}
              <div style={{display:"flex",alignItems:"center",gap:4,padding:"1px 7px",borderRadius:20,
                background:saveStatus==="error"?"rgba(239,68,68,0.15)":saveStatus==="saving"?"rgba(251,191,36,0.12)":"rgba(0,255,136,0.1)",
                border:saveStatus==="error"?"1px solid rgba(239,68,68,0.3)":saveStatus==="saving"?"1px solid rgba(251,191,36,0.25)":"1px solid rgba(0,255,136,0.2)"}}>
                <div style={{width:5,height:5,borderRadius:"50%",
                  background:saveStatus==="error"?"#ef4444":saveStatus==="saving"?"#fbbf24":"#00ff88",
                  boxShadow:saveStatus==="saving"?"0 0 6px #fbbf24":""}}/>
                <span style={{fontSize:9,fontWeight:700,letterSpacing:"0.06em",
                  color:saveStatus==="error"?"#ef4444":saveStatus==="saving"?"#fbbf24":"#00ff88"}}>
                  {saveStatus==="error"?"SAVE FAILED":saveStatus==="saving"?"SAVING...":"SAVED"}
                </span>
              </div>
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:7,alignItems:"center"}}>
          <button className="btn" onClick={function(){setShowProfiles(true);}} style={{
            background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,
            padding:"7px 11px",fontSize:12,color:"rgba(255,255,255,0.55)",letterSpacing:"0.05em"}}>&#128100; Profiles</button>
          <button className="btn" onClick={function(){setShowRules(true);}} style={{
            background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,
            padding:"7px 11px",fontSize:12,color:"rgba(255,255,255,0.55)",letterSpacing:"0.05em"}}>&#9432; Rules</button>
          <button className="btn" onClick={function(){setNewListName(activeList.name);setSheet("renameList");}} style={{
            background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,
            padding:"7px 10px",fontSize:12,color:"rgba(255,255,255,0.55)",maxWidth:110,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
            {activeList.name} &#9998;</button>
        </div>
      </div>
    </div>

    {/* TAB BAR */}
    <div style={{display:"flex",background:"rgba(255,255,255,0.025)",borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
      {[{id:"squad",label:"Squad ("+players.length+")"},{id:"teams",label:teams?"Teams ("+teams.length+")":"Teams"}].map(function(tab){
        return <button key={tab.id} className="btn" onClick={function(){setView(tab.id);}} style={{
          flex:1,padding:"13px",fontSize:14,fontWeight:700,letterSpacing:"0.05em",background:"transparent",
          color:view===tab.id?accentColor:"rgba(255,255,255,0.38)",
          borderBottom:view===tab.id?"2.5px solid "+accentColor:"2.5px solid transparent"}}>{tab.label}</button>;
      })}
    </div>

    {/* ═══ SQUAD VIEW ═══ */}
    {view==="squad"&&<div style={{padding:"14px 14px 0"}}>

      {/* Config */}
      <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"13px 14px",marginBottom:14}}>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,letterSpacing:"0.11em",textTransform:"uppercase",color:"rgba(255,255,255,0.38)",fontWeight:600,marginBottom:8}}>Players per team</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {Array.from({length:sport.maxAside-sport.minAside+1},function(_,i){return i+sport.minAside;}).map(function(n){return <button key={n} className="btn" onClick={function(){setPlayersAside(n);setTeams(null);}} style={{
              padding:"7px 11px",borderRadius:7,fontSize:14,minHeight:38,
              background:playersAside===n?accentColor:"rgba(255,255,255,0.07)",
              color:playersAside===n?"#080c10":"rgba(255,255,255,0.55)",
              border:playersAside===n?"none":"1px solid rgba(255,255,255,0.1)"}}>{n}</button>;})}
          </div>
        </div>
        <div>
          <div style={{fontSize:10,letterSpacing:"0.11em",textTransform:"uppercase",color:"rgba(255,255,255,0.38)",fontWeight:600,marginBottom:8}}>Number of teams</div>
          <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
            {[2,3,4,5,6,8,10].map(function(n){return <button key={n} className="btn" onClick={function(){setNumTeams(n);setCustomNumTeams("");setTeams(null);}} style={{
              padding:"7px 11px",borderRadius:7,fontSize:14,minHeight:38,
              background:numTeams===n&&customNumTeams===""?"#fbbf24":"rgba(255,255,255,0.07)",
              color:numTeams===n&&customNumTeams===""?"#080c10":"rgba(255,255,255,0.55)",
              border:numTeams===n&&customNumTeams===""?"none":"1px solid rgba(255,255,255,0.1)"}}>{n}</button>;})}
            <div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:7,overflow:"hidden"}}>
              <input value={customNumTeams} onChange={function(e){
                var v=e.target.value.replace(/[^0-9]/g,"");
                setCustomNumTeams(v);
                if(v&&parseInt(v)>=2){setNumTeams(parseInt(v));setTeams(null);}
              }} placeholder="Custom" style={{width:72,padding:"7px 10px",background:"transparent",border:"none",color:"#fbbf24",fontSize:14,fontWeight:700}}/>
            </div>
          </div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.25)",marginTop:6}}>Ideal: {effectiveNumTeams*playersAside} players total &bull; {players.length} in squad</div>
        </div>
      </div>

      {/* Lists */}
      <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:4}}>
        {lists.map(function(l){return <div key={l.id} style={{display:"flex",borderRadius:8,overflow:"hidden",flexShrink:0,
          border:activeListId===l.id?"1px solid "+accentColor+"55":"1px solid rgba(255,255,255,0.1)"}}>
          <button className="btn" onClick={function(){setActiveListId(l.id);setTeams(null);}} style={{
            padding:"8px 12px",fontSize:13,whiteSpace:"nowrap",
            background:activeListId===l.id?"rgba(0,255,136,0.1)":"rgba(255,255,255,0.04)",
            color:activeListId===l.id?accentColor:"rgba(255,255,255,0.5)"}}>{l.name} ({l.players.length})</button>
          {lists.length>1&&<button className="btn" onClick={function(){deleteList(l.id);}} style={{
            padding:"8px 9px",background:"rgba(239,68,68,0.07)",color:"rgba(239,68,68,0.5)",fontSize:13,
            borderLeft:"1px solid rgba(255,255,255,0.07)"}}>&#10005;</button>}
        </div>;})}
        <button className="btn" onClick={function(){setNewListName("");setSheet("newList");}} style={{
          padding:"8px 12px",borderRadius:8,background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.38)",
          border:"1px dashed rgba(255,255,255,0.14)",fontSize:13,whiteSpace:"nowrap",flexShrink:0}}>+ New</button>
      </div>

      {/* Action buttons */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        <button className="btn" onClick={function(){setForm({name:"",position:sport.positions[sport.positions.length-1]||"ANY",skill:3,editId:null});setSheet("addPlayer");}} style={{
          padding:"14px 10px",borderRadius:11,fontSize:14,background:"rgba(0,255,136,0.09)",color:"#00ff88",
          border:"1px solid rgba(0,255,136,0.25)"}}>+ Add Player</button>
        <button className="btn" onClick={function(){setBulkText("");setBulkPos(sport.positions[sport.positions.length-1]||"ANY");setBulkSkill(3);setSheet("bulk");}} style={{
          padding:"14px 10px",borderRadius:11,fontSize:14,background:"rgba(96,165,250,0.09)",color:"#60a5fa",
          border:"1px solid rgba(96,165,250,0.2)"}}>&#128203; Bulk Import</button>
      </div>

      {/* Player list */}
      {players.length===0
        ?<div style={{textAlign:"center",padding:"40px 20px",color:"rgba(255,255,255,0.16)",fontSize:14,lineHeight:1.8}}>
          No players yet.<br/>Add manually or paste a numbered list.
         </div>
        :<div>
          {/* Duplicate warning banner */}
          {(function(){
            var seen={};var dupes=[];
            players.forEach(function(p){var k=normaliseName(p.name);if(seen[k])dupes.push(p.name);else seen[k]=true;});
            return dupes.length>0?<div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",
              background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:9,marginBottom:8}}>
              <span style={{fontSize:14,flexShrink:0}}>⚠️</span>
              <span style={{flex:1,fontSize:13,color:"#ef4444",fontWeight:600,lineHeight:1.4}}>
                {dupes.length} duplicate{dupes.length>1?"s":""} in squad — may affect team balance
              </span>
              <button className="btn" onClick={cleanDuplicates} style={{
                padding:"6px 12px",borderRadius:7,fontSize:12,fontWeight:800,flexShrink:0,
                background:"#ef4444",color:"#fff",border:"none"}}>Fix Now</button>
            </div>:null;
          })()}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:11,color:"rgba(255,255,255,0.3)",letterSpacing:"0.08em",textTransform:"uppercase"}}>{players.length} players</span>
            <div style={{display:"flex",gap:6}}>
              <button className="btn" onClick={cleanDuplicates} style={{
                padding:"4px 9px",borderRadius:5,fontSize:11,background:"rgba(251,191,36,0.07)",color:"rgba(251,191,36,0.6)",
                border:"1px solid rgba(251,191,36,0.18)"}}>&#128269; Dedupe</button>
              <button className="btn" onClick={function(){updPlayers(function(){return [];});}} style={{
                padding:"4px 9px",borderRadius:5,fontSize:11,background:"rgba(239,68,68,0.07)",color:"rgba(239,68,68,0.55)",
                border:"1px solid rgba(239,68,68,0.16)"}}>Clear all</button>
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {(function(){
              // Track seen names to highlight duplicates
              var seen={};
              return players.map(function(pl,i){
                var key=normaliseName(pl.name);
                var isDupe=seen[key]!==undefined;
                seen[key]=(seen[key]||0)+1;
                return <div key={pl.id} className="rh" style={{
                  display:"flex",alignItems:"center",gap:8,padding:"11px 12px",borderRadius:10,cursor:"pointer",
                  background:isDupe?"rgba(239,68,68,0.07)":"rgba(255,255,255,0.03)",
                  border:isDupe?"1px solid rgba(239,68,68,0.25)":"1px solid rgba(255,255,255,0.07)",transition:"background 0.1s"
                }} onClick={function(){startEdit(pl);}}>
                  <span style={{fontSize:11,color:isDupe?"#ef4444":"rgba(255,255,255,0.2)",minWidth:20,textAlign:"right"}}>{isDupe?"!":i+1}</span>
                  <span style={{fontSize:9,fontWeight:800,padding:"2px 6px",borderRadius:4,minWidth:32,textAlign:"center",
                    background:(PCOLS[pl.position]||accentColor)+"33",color:PCOLS[pl.position]||accentColor}}>{pl.position}</span>
                  <span style={{flex:1,fontSize:15,fontWeight:600,color:isDupe?"#ef4444":"rgba(255,255,255,0.85)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pl.name}</span>
                  {isDupe&&<span style={{fontSize:9,fontWeight:800,padding:"1px 6px",borderRadius:20,background:"rgba(239,68,68,0.15)",color:"#ef4444",border:"1px solid rgba(239,68,68,0.3)",whiteSpace:"nowrap"}}>DUP</span>}
                  <SkillDots value={pl.skill}/>
                  <button className="btn" onClick={function(e){e.stopPropagation();removePlayer(pl.id);}} style={{
                    width:28,height:28,borderRadius:6,background:"rgba(239,68,68,0.1)",color:"#ef4444",
                    border:"1px solid rgba(239,68,68,0.2)",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>&#10005;</button>
                </div>;
              });
            })()}
          </div>
        </div>
      }

      {/* Generate */}
      <div style={{padding:"18px 0 8px",textAlign:"center"}}>
        <button className="btn" onClick={generateTeams} disabled={!canGen} style={{
          width:"100%",padding:"16px",borderRadius:12,fontSize:16,fontWeight:800,letterSpacing:"0.09em",
          background:canGen?"linear-gradient(135deg,"+accentColor+","+accentColor+"aa)":"rgba(255,255,255,0.05)",
          color:canGen?"#080c10":"rgba(255,255,255,0.18)",
          boxShadow:canGen?"0 0 28px "+accentColor+"44,0 4px 16px rgba(0,0,0,0.4)":"none",border:"none"}}>
          &#9889; GENERATE {effectiveNumTeams} BALANCED TEAMS
        </button>
        {!canGen&&players.length>0&&<div style={{marginTop:8,color:"rgba(255,255,255,0.22)",fontSize:13}}>Need at least {effectiveNumTeams} players</div>}
      </div>
    </div>}

    {/* ═══ TEAMS VIEW ═══ */}
    {view==="teams"&&<div style={{padding:"14px 14px 0"}}>
      {!teams
        ?<div style={{textAlign:"center",padding:"50px 20px",color:"rgba(255,255,255,0.18)",fontSize:14,lineHeight:1.9}}>
            No teams yet.<br/>Go to <span style={{color:accentColor,fontWeight:700}}>Squad</span> tab and generate.
          </div>
        :<div>
          <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
            <button className="btn" onClick={function(){setEditingTeams(function(e){return !e;});}} style={{
              flex:1,padding:"11px",borderRadius:9,fontSize:14,minHeight:44,
              background:editingTeams?"rgba(251,191,36,0.16)":"rgba(255,255,255,0.06)",
              color:editingTeams?"#fbbf24":"rgba(255,255,255,0.55)",
              border:editingTeams?"1px solid rgba(251,191,36,0.38)":"1px solid rgba(255,255,255,0.1)"}}>
              {editingTeams?"&#10003; Done":"&#9998; Edit"}</button>
            <button className="btn" onClick={openExport} style={{
              flex:1,padding:"11px",borderRadius:9,fontSize:14,minHeight:44,
              background:"rgba(96,165,250,0.09)",color:"#60a5fa",border:"1px solid rgba(96,165,250,0.22)"}}>&#128228; Export</button>
            <button className="btn" onClick={reshuffleTeams} style={{
              flex:1,padding:"11px",borderRadius:9,fontSize:14,minHeight:44,
              background:"rgba(168,85,247,0.1)",color:"#a855f7",border:"1px solid rgba(168,85,247,0.25)"}}>&#127922; Shuffle</button>
            <button className="btn" onClick={generateTeams} style={{
              flex:1,padding:"11px",borderRadius:9,fontSize:14,minHeight:44,
              background:"rgba(0,255,136,0.07)",color:"#00ff88",border:"1px solid rgba(0,255,136,0.18)"}}>&#9889; Rebalance</button>
          </div>

          {showExport&&<div style={{background:"rgba(96,165,250,0.05)",border:"1px solid rgba(96,165,250,0.2)",borderRadius:12,padding:14,marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontSize:13,fontWeight:700,color:"#60a5fa",textTransform:"uppercase",letterSpacing:"0.08em"}}>Exported List</span>
              <div style={{display:"flex",gap:7}}>
                <button className="btn" onClick={copyClip} style={{padding:"7px 14px",borderRadius:7,fontSize:13,background:"#60a5fa",color:"#080c10"}}>Copy</button>

              </div>
            </div>
            <textarea value={exportText} onChange={function(e){setExportText(e.target.value);}} rows={10}
