          </div>}

          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {teams.map(function(team,ti){
              var c=team.color;
              var avg=team.players.length?(team.players.reduce(function(s,p){return s+p.skill;},0)/team.players.length).toFixed(1):"--";
              return <div key={ti} className="t-card" style={{animationDelay:(ti*0.06)+"s",background:"rgba(255,255,255,0.02)",
                border:"1px solid "+c+"33",borderRadius:14,overflow:"hidden",
                outline:editingTeams&&dragOver===ti?"2px dashed "+c:"none"}}
                onDragOver={function(e){e.preventDefault();setDragOver(ti);}}
                onDrop={function(e){e.preventDefault();var d=dragRef.current;if(d.player&&d.fromTeam!==ti)movePlayer(d.fromTeam,ti,d.player.id);dragRef.current={player:null,fromTeam:null};setDragOver(null);}}
                onDragLeave={function(){setDragOver(null);}}>
                <div style={{background:"linear-gradient(135deg,"+c+"20,"+c+"06)",borderBottom:"1px solid "+c+"22",padding:"12px 14px"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{display:"flex",alignItems:"center",gap:9,flex:1,minWidth:0}}>
                      {/* Jersey colour swatch — always visible, tap to change */}
                      <button className="btn" title="Change jersey colour" onClick={function(){setJerseySheet(ti);}} style={{
                        width:32,height:32,borderRadius:6,background:team.jersey||c,
                        border:"2px solid rgba(255,255,255,0.25)",flexShrink:0,
                        boxShadow:"0 2px 8px rgba(0,0,0,0.4)",position:"relative",overflow:"hidden"}}>
                        <span style={{fontSize:14,lineHeight:1}}>&#128085;</span>
                      </button>
                      {editingTeams
                        ?<input defaultValue={team.name} onBlur={function(e){renameTeam(ti,e.target.value||team.name);}}
                            style={{background:"transparent",border:"none",borderBottom:"1px solid "+c+"77",color:c,fontSize:17,fontWeight:800,letterSpacing:"0.07em",textTransform:"uppercase",width:"100%",padding:"2px 0",fontFamily:"inherit"}}/>
                        :<div style={{fontSize:17,fontWeight:800,letterSpacing:"0.07em",color:c,textTransform:"uppercase",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{team.name}</div>
                      }
                    </div>
                    <div style={{textAlign:"right",marginLeft:8,flexShrink:0}}>
                      <div style={{fontSize:21,fontWeight:800,color:c,lineHeight:1}}>{avg}</div>
                      <div style={{fontSize:9,color:"rgba(255,255,255,0.28)",letterSpacing:"0.08em"}}>AVG SKILL</div>
                    </div>
                  </div>
                  <div style={{fontSize:12,color:"rgba(255,255,255,0.32)",marginTop:5,display:"flex",alignItems:"center",gap:6}}>
                    <span style={{width:8,height:8,borderRadius:2,background:team.jersey||c,display:"inline-block",flexShrink:0}}/>
                    <span>{team.players.length} player{team.players.length!==1?"s":""}</span>
                    {team.jersey&&<span style={{color:"rgba(255,255,255,0.2)"}}>· {(JERSEY_PRESETS.find(function(p){return p.hex===team.jersey;})||{name:"Custom"}).name} jersey</span>}
                  </div>
                </div>
                <div style={{padding:"9px 12px",display:"flex",flexDirection:"column",gap:5,minHeight:30}}>
                  {team.players.map(function(pl,pi){return <div key={pl.id}
                    draggable={editingTeams}
                    onDragStart={function(){dragRef.current={player:pl,fromTeam:ti};}}
                    style={{display:"flex",alignItems:"center",gap:7,padding:"9px 10px",background:"rgba(255,255,255,0.03)",
                      borderRadius:8,border:"1px solid rgba(255,255,255,0.05)",cursor:editingTeams?"grab":"default"}}>
                    <span style={{fontSize:10,color:"rgba(255,255,255,0.2)",minWidth:16}}>{pi+1}</span>
                    <span style={{fontSize:9,fontWeight:800,padding:"2px 5px",borderRadius:4,minWidth:28,textAlign:"center",
                      background:(PCOLS[pl.position]||c)+"33",color:PCOLS[pl.position]||c}}>{pl.position}</span>
                    <span style={{flex:1,fontSize:14,fontWeight:600,color:"rgba(255,255,255,0.82)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pl.name}</span>
                    <SkillDots value={pl.skill} color={c} size={8}/>
                    {editingTeams&&<div style={{display:"flex",gap:5,marginLeft:4}}>
                      <button className="btn" onClick={function(){setMoveModal({player:pl,fromTeamIdx:ti});}} style={{
                        width:30,height:30,borderRadius:6,background:"rgba(96,165,250,0.14)",color:"#60a5fa",
                        border:"1px solid rgba(96,165,250,0.22)",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>&#8644;</button>
                      <button className="btn" onClick={function(){editTp(ti,pl);}} style={{
                        width:30,height:30,borderRadius:6,background:"rgba(251,191,36,0.11)",color:"#fbbf24",
                        border:"1px solid rgba(251,191,36,0.22)",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>&#9998;</button>
                      <button className="btn" onClick={function(){removeFromTeam(ti,pl.id);}} style={{
                        width:30,height:30,borderRadius:6,background:"rgba(239,68,68,0.1)",color:"#ef4444",
                        border:"1px solid rgba(239,68,68,0.2)",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>&#10005;</button>
                    </div>}
                  </div>;})}
                  {editingTeams&&<div style={{padding:"8px",borderRadius:7,border:"1px dashed rgba(255,255,255,0.1)",textAlign:"center",fontSize:12,color:"rgba(255,255,255,0.18)",marginTop:2}}>drag here</div>}
                </div>
                {editingTeams&&bench.length>0&&<div style={{padding:"0 12px 12px"}}>
                  <select onChange={function(e){var pid=parseInt(e.target.value);var p=bench.find(function(x){return x.id===pid;});if(p){addToTeam(ti,p);e.target.value="";}}} defaultValue="" style={{
                    width:"100%",background:"rgba(0,255,136,0.07)",border:"1px dashed rgba(0,255,136,0.25)",borderRadius:8,
                    padding:"9px 11px",color:"#00ff88",fontSize:14,fontFamily:"inherit",cursor:"pointer",outline:"none"}}>
                    <option value="" disabled>+ Add from bench...</option>
                    {bench.map(function(p){return <option key={p.id} value={p.id}>{p.name} [{p.position}]</option>;})}
                  </select>
                </div>}
              </div>;
            })}
          </div>

          {bench.length>0&&<div style={{background:"rgba(251,191,36,0.04)",border:"1px solid rgba(251,191,36,0.18)",borderRadius:12,padding:"12px 14px",marginTop:12}}>
            <div style={{fontSize:11,fontWeight:800,letterSpacing:"0.1em",color:"#fbbf24",marginBottom:9,textTransform:"uppercase"}}>Bench ({bench.length})</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {bench.map(function(pl){return <span key={pl.id} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",background:"rgba(255,255,255,0.05)",borderRadius:6,fontSize:13,color:"rgba(255,255,255,0.52)"}}>
                <span style={{fontSize:9,color:PCOLS[pl.position]||accentColor,fontWeight:800}}>{pl.position}</span>{pl.name}
              </span>;})}
            </div>
          </div>}
        </div>
      }
    </div>}

    {/* ═══ SHEETS ═══ */}

    {(sheet==="addPlayer"||sheet==="editPlayer")&&<Sheet title={sheet==="editPlayer"?"Edit Player":"Add Player"} onClose={function(){setSheet(null);}}>
      <AddPlayerSheet
        form={form} setForm={setForm} positions={sport.positions}
        isEdit={sheet==="editPlayer"}
        profileDB={profileDB}
        accent={sheet==="editPlayer"?"#fbbf24":accentColor}
        onSave={savePlayer}/>
    </Sheet>}

    {sheet==="editTp"&&tpForm&&<Sheet title="Edit Player" onClose={function(){setSheet(null);setTpForm(null);}}>
      <PlayerForm form={tpForm.form} positions={sport.positions}
        setForm={function(f){setTpForm(function(t){return Object.assign({},t,{form:typeof f==="function"?f(t.form):f});});}}
        onSave={saveTp} saveLabel="UPDATE PLAYER" accent="#fbbf24"/>
    </Sheet>}

    {moveModal&&<Sheet title={"Move "+moveModal.player.name} onClose={function(){setMoveModal(null);}}>
      <div style={{display:"flex",flexDirection:"column",gap:9,paddingBottom:8}}>
        <p style={{fontSize:14,color:"rgba(255,255,255,0.4)",marginBottom:4}}>Move to which team?</p>
        {teams.map(function(t,ti){return ti!==moveModal.fromTeamIdx&&<button key={ti} className="btn"
          onClick={function(){movePlayer(moveModal.fromTeamIdx,ti,moveModal.player.id);setMoveModal(null);}} style={{
            padding:"14px",borderRadius:10,fontSize:15,background:t.color+"18",color:t.color,
            border:"1px solid "+t.color+"33",textAlign:"left",minHeight:52}}>
          &#8594; {t.name} ({t.players.length} players)</button>;})}
        <button className="btn" onClick={function(){removeFromTeam(moveModal.fromTeamIdx,moveModal.player.id);setMoveModal(null);flash2("On bench!");}} style={{
          padding:"14px",borderRadius:10,fontSize:14,background:"rgba(251,191,36,0.09)",color:"#fbbf24",
          border:"1px solid rgba(251,191,36,0.22)",marginTop:4,minHeight:52}}>&#8594; Bench</button>
      </div>
    </Sheet>}

    {sheet==="bulk"&&<Sheet title="Bulk Import" onClose={function(){setSheet(null);}}>
      <div style={{display:"flex",flexDirection:"column",gap:16,paddingBottom:8}}>
        <div>
          <label style={{display:"block",fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(255,255,255,0.45)",marginBottom:8}}>Paste numbered list</label>
          <textarea value={bulkText} onChange={function(e){setBulkText(e.target.value);}} rows={8}
            placeholder={"1. Alex Johnson\n2. Marcus Lee\n3) Jamie Smith\n4 Chris Brown"}
            style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,
              padding:"11px 13px",color:"#fff",fontSize:15,resize:"vertical",lineHeight:1.6}}/>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.26)",marginTop:5}}>{bulkText.split("\n").filter(function(l){return l.trim();}).length} lines &bull; Numbers stripped automatically</div>
        </div>
        <div>
          <label style={{display:"block",fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(255,255,255,0.45)",marginBottom:8}}>Default Position</label>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {sport.positions.map(function(pos){return <button key={pos} className="btn" onClick={function(){setBulkPos(pos);}} style={{
              padding:"9px 13px",borderRadius:8,fontSize:13,minHeight:44,
              background:bulkPos===pos?(PCOLS[pos]||accentColor):"rgba(255,255,255,0.07)",
              color:bulkPos===pos?"#fff":"rgba(255,255,255,0.5)"}}>{pos}</button>;})}</div>
        </div>
        <div>
          <label style={{display:"block",fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(255,255,255,0.45)",marginBottom:8}}>
            Default Skill&nbsp;<span style={{color:"#00ff88",fontWeight:700}}>{skillLabel(bulkSkill)}</span>
          </label>
          <div style={{display:"flex",gap:7}}>
            {[1,2,3,4,5].map(function(s){return <button key={s} className="btn" onClick={function(){setBulkSkill(s);}} style={{
              flex:1,height:46,borderRadius:9,fontSize:17,fontWeight:800,
              background:s<=bulkSkill?"rgba(0,255,136,0.15)":"rgba(255,255,255,0.06)",
              color:s<=bulkSkill?"#00ff88":"rgba(255,255,255,0.22)",
              border:s<=bulkSkill?"1px solid rgba(0,255,136,0.38)":"1px solid rgba(255,255,255,0.08)"}}>{s}</button>;})}</div>
        </div>
        <button className="btn" onClick={parseBulk} disabled={!bulkText.trim()} style={{
          padding:"15px",borderRadius:11,fontSize:15,fontWeight:800,background:"#60a5fa",color:"#080c10",border:"none",
          boxShadow:"0 0 18px rgba(96,165,250,0.28)"}}>IMPORT PLAYERS</button>
      </div>
    </Sheet>}

    {sheet==="newList"&&<Sheet title="Create New List" onClose={function(){setSheet(null);}}>
      <div style={{display:"flex",flexDirection:"column",gap:14,paddingBottom:8}}>
        <input value={newListName} onChange={function(e){setNewListName(e.target.value);}} placeholder="e.g. Monday Night, Team A..." autoFocus
          style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:10,padding:"13px 14px",color:"#fff",fontSize:16}}/>
        <button className="btn" onClick={createList} disabled={!newListName.trim()} style={{padding:"15px",borderRadius:11,fontSize:15,fontWeight:800,background:accentColor,color:"#080c10",border:"none"}}>CREATE LIST</button>
      </div>
    </Sheet>}

    {sheet==="renameList"&&<Sheet title="Rename List" onClose={function(){setSheet(null);}}>
      <div style={{display:"flex",flexDirection:"column",gap:14,paddingBottom:8}}>
        <input value={newListName} onChange={function(e){setNewListName(e.target.value);}} autoFocus
          style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:10,padding:"13px 14px",color:"#fff",fontSize:16}}/>
        <button className="btn" onClick={renameList} disabled={!newListName.trim()} style={{padding:"15px",borderRadius:11,fontSize:15,fontWeight:800,background:"#fbbf24",color:"#080c10",border:"none"}}>RENAME</button>
      </div>
    </Sheet>}

    {showRules&&<RulesSheet sport={sport} onClose={function(){setShowRules(false);}}/>}

    {/* ── DUPLICATE REVIEW SHEET ── */}
    {sheet==="duplicateReview"&&duplicateReview&&(function(){
      // Local state inside render — use a wrapper component so hooks work
      return <DuplicateReviewSheet
        review={duplicateReview}
        onConfirm={confirmDuplicateReview}
        onClose={function(){setDuplicateReview(null);setSheet(null);}}
        sport={sport}
      />;
    })()}

    {/* ── PROFILES SHEET ── */}
    {showProfiles&&<Sheet title="&#128100; Player Profiles" onClose={function(){setShowProfiles(false);}}>
      <div style={{display:"flex",flexDirection:"column",gap:16,paddingBottom:16}}>

        {/* Save status */}
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",background:"rgba(0,255,136,0.07)",border:"1px solid rgba(0,255,136,0.2)",borderRadius:10}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:"#00ff88",boxShadow:"0 0 8px #00ff88",flexShrink:0}}/>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:"#00ff88"}}>Profile DB — Auto-save enabled</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.38)",marginTop:1}}>Player profiles persist even when you clear your squad. Skill ratings are remembered across sessions.</div>
          </div>
        </div>

        {/* Stats */}
        {Object.keys(profileDB).length>0&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[
            {label:"Profiles Saved",val:Object.keys(profileDB).length},
            {label:"Active Squad",val:players.length},
            {label:"Avg Skill",val:(function(){
              var vals=Object.values(profileDB);
              return vals.length?(vals.reduce(function(s,p){return s+p.skill;},0)/vals.length).toFixed(1):"—";
            })()}
          ].map(function(s){return <div key={s.label} style={{background:"rgba(255,255,255,0.03)",borderRadius:9,padding:"11px 10px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:800,color:"#00ff88"}}>{s.val}</div>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.35)",marginTop:3,letterSpacing:"0.06em",textTransform:"uppercase",lineHeight:1.3}}>{s.label}</div>
          </div>;})}
        </div>}

        {/* Profile DB list */}
        {Object.keys(profileDB).length===0
          ?<div style={{textAlign:"center",padding:"30px 0",color:"rgba(255,255,255,0.2)",fontSize:14}}>No profiles saved yet.<br/>Add players to build your database.</div>
          :<div>
            <div style={{fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(255,255,255,0.35)",fontWeight:700,marginBottom:9}}>
              All Saved Profiles ({Object.keys(profileDB).length})
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:320,overflowY:"auto"}}>
              {Object.values(profileDB).sort(function(a,b){return a.name.localeCompare(b.name);}).map(function(pl,i){
                var PCOLS2={GK:"#f59e0b",DEF:"#3b82f6",MID:"#10b981",FWD:"#ef4444",ANY:"#8b5cf6",
                  PG:"#f59e0b",SG:"#3b82f6",SF:"#10b981",PF:"#ef4444",C:"#60a5fa",
                  Setter:"#f59e0b",Libero:"#3b82f6",OH:"#10b981",MB:"#ef4444",OPP:"#a78bfa",
                  Singles:"#60a5fa",Doubles:"#fbbf24"};
                var inCurrentSquad=players.some(function(p){return p.name.trim().toLowerCase()===pl.name.trim().toLowerCase();});
                return <div key={pl.name} style={{display:"flex",alignItems:"center",gap:7,padding:"8px 10px",
                  background:inCurrentSquad?"rgba(0,255,136,0.05)":"rgba(255,255,255,0.03)",
                  borderRadius:8,border:inCurrentSquad?"1px solid rgba(0,255,136,0.15)":"1px solid rgba(255,255,255,0.06)"}}>
                  <span style={{fontSize:9,fontWeight:800,padding:"2px 5px",borderRadius:3,minWidth:28,textAlign:"center",
                    background:(PCOLS2[pl.position]||"#8b5cf6")+"33",color:PCOLS2[pl.position]||"#8b5cf6"}}>{pl.position}</span>
                  <span style={{flex:1,fontSize:14,fontWeight:600,color:inCurrentSquad?"rgba(0,255,136,0.85)":"rgba(255,255,255,0.82)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pl.name}</span>
                  {inCurrentSquad&&<span style={{fontSize:9,color:"#00ff88",fontWeight:700,whiteSpace:"nowrap"}}>In Squad</span>}
                  <SkillDots value={pl.skill} size={8}/>
                  <span style={{fontSize:11,color:"rgba(255,255,255,0.4)",minWidth:24,textAlign:"right",fontWeight:700}}>{pl.skill}</span>
                </div>;
              })}
            </div>
          </div>
        }

        {/* Danger zone */}
        <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:14,marginTop:4,display:"flex",flexDirection:"column",gap:8}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.28)",letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:6}}>Profile Database</div>
          <button className="btn" onClick={function(){
            // Force reseed entire DB from all lists
            var updated={};
            lists.forEach(function(l){(l.players||[]).forEach(function(p){upsertProfile(updated,p);});});
            try{localStorage.setItem(PROFILE_DB_KEY,JSON.stringify(updated));}catch(e){}
            setProfileDB(updated);
            flash2("Profile DB rebuilt — "+Object.keys(updated).length+" profiles!");
          }} style={{width:"100%",padding:"12px",borderRadius:9,fontSize:13,background:"rgba(0,255,136,0.07)",color:"rgba(0,255,136,0.7)",border:"1px solid rgba(0,255,136,0.18)",marginBottom:8}}>
            &#128260; Rebuild Profile DB from All Lists
          </button>
          <button className="btn" onClick={function(){
            if(window.confirm("Clear current squad only? Profile database will be kept.")){
              updPlayers(function(){return [];});
              setShowProfiles(false);flash2("Squad cleared — profiles kept");
            }
          }} style={{width:"100%",padding:"12px",borderRadius:9,fontSize:13,background:"rgba(251,191,36,0.07)",color:"rgba(251,191,36,0.7)",border:"1px solid rgba(251,191,36,0.18)"}}>
            &#128465; Clear Current Squad (keep profiles)
          </button>
          <button className="btn" onClick={function(){
            if(window.confirm("Delete ALL saved profiles? This cannot be undone. Your squad lists will remain.")){
              try{localStorage.removeItem(PROFILE_DB_KEY);}catch(e){}
              setProfileDB({});flash2("Profile database cleared");
            }
          }} style={{width:"100%",padding:"12px",borderRadius:9,fontSize:13,background:"rgba(239,68,68,0.07)",color:"rgba(239,68,68,0.65)",border:"1px solid rgba(239,68,68,0.18)"}}>
            &#128465; Clear Profile Database
          </button>
          <button className="btn" onClick={function(){
            if(window.confirm("Clear everything — squad, lists AND profiles? This cannot be undone.")){
              try{localStorage.removeItem(STORAGE_KEY);localStorage.removeItem(PROFILE_DB_KEY);}catch(e){}
              setLists([{id:1,name:"My Squad",players:[]}]);
              setActiveListId(1);setTeams(null);setProfileDB({});setShowProfiles(false);
              flash2("All data cleared");
            }
          }} style={{width:"100%",padding:"12px",borderRadius:9,fontSize:13,background:"rgba(239,68,68,0.08)",color:"rgba(239,68,68,0.55)",border:"1px solid rgba(239,68,68,0.14)"}}>
            &#128465; Clear Everything
          </button>
        </div>
      </div>
    </Sheet>}

    {jerseySheet!==null&&teams&&teams[jerseySheet]&&<Sheet title={"&#128085; "+teams[jerseySheet].name+" — Jersey Colour"} onClose={function(){setJerseySheet(null);}}>
      <div style={{display:"flex",flexDirection:"column",gap:18,paddingBottom:12}}>
        {/* Current colour preview */}
        <div style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",background:"rgba(255,255,255,0.04)",borderRadius:12,border:"1px solid rgba(255,255,255,0.09)"}}>
          <div style={{width:48,height:48,borderRadius:10,background:teams[jerseySheet].jersey||"#888",border:"3px solid rgba(255,255,255,0.2)",boxShadow:"0 4px 14px rgba(0,0,0,0.4)",fontSize:22,display:"flex",alignItems:"center",justifyContent:"center"}}>&#128085;</div>
          <div>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.45)",marginBottom:3}}>Current colour</div>
            <div style={{fontSize:16,fontWeight:700,color:"#fff"}}>{(JERSEY_PRESETS.find(function(p){return p.hex===teams[jerseySheet].jersey;})||{name:"Custom"}).name}</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.3)",marginTop:1,fontFamily:"monospace"}}>{teams[jerseySheet].jersey}</div>
          </div>
        </div>

        {/* Preset swatches */}
        <div>
          <div style={{fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(255,255,255,0.38)",fontWeight:700,marginBottom:10}}>Common Jersey Colours</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
            {JERSEY_PRESETS.map(function(p){
              var active=teams[jerseySheet].jersey===p.hex;
              return <button key={p.hex} className="btn" onClick={function(){changeJersey(jerseySheet,p.hex);}} style={{
                padding:"10px 6px",borderRadius:9,display:"flex",flexDirection:"column",alignItems:"center",gap:5,
                background:active?"rgba(255,255,255,0.1)":"rgba(255,255,255,0.04)",
                border:active?"2px solid rgba(255,255,255,0.5)":"2px solid transparent"}}>
                <div style={{width:28,height:28,borderRadius:6,background:p.hex,boxShadow:"0 2px 8px rgba(0,0,0,0.35)",
                  border:p.hex==="#f0f0f0"?"1px solid rgba(255,255,255,0.15)":"none"}}/>
                <span style={{fontSize:10,color:active?"#fff":"rgba(255,255,255,0.45)",fontWeight:active?700:500,letterSpacing:"0.02em"}}>{p.name}</span>
              </button>;
            })}
          </div>
        </div>

        {/* Custom hex / colour picker */}
        <div>
          <div style={{fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(255,255,255,0.38)",fontWeight:700,marginBottom:10}}>Custom Colour</div>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <input type="color" value={teams[jerseySheet].jersey||"#ffffff"} onChange={function(e){changeJersey(jerseySheet,e.target.value);}}
              style={{width:52,height:52,borderRadius:10,border:"2px solid rgba(255,255,255,0.2)",background:"transparent",cursor:"pointer",padding:2}}/>
            <div style={{flex:1}}>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.4)",marginBottom:4}}>Tap the colour wheel to pick any colour</div>
              <input value={teams[jerseySheet].jersey||""} onChange={function(e){
                var v=e.target.value;
                if(/^#[0-9a-fA-F]{6}$/.test(v))changeJersey(jerseySheet,v);
              }} placeholder="#rrggbb" maxLength={7}
                style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:8,
                  padding:"9px 12px",color:"#fff",fontSize:15,fontFamily:"monospace"}}/>
            </div>
          </div>
        </div>

        <button className="btn" onClick={function(){setJerseySheet(null);}} style={{
          padding:"14px",borderRadius:11,fontSize:15,fontWeight:800,background:"#00ff88",color:"#080c10",border:"none",
          boxShadow:"0 0 20px rgba(0,255,136,0.3)"}}>&#10003; Done</button>
      </div>
    </Sheet>}

  </div>;
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return {err:e};}
  render(){
    if(this.state.err){
      return <div style={{minHeight:"100vh",background:"#080c10",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"'Rajdhani',sans-serif"}}>
        <div style={{fontSize:40,marginBottom:16}}>⚠️</div>
        <div style={{fontSize:18,fontWeight:700,color:"#ef4444",marginBottom:8}}>Something went wrong</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.4)",marginBottom:24,textAlign:"center",maxWidth:320}}>
          {this.state.err.message||"An unexpected error occurred."}
        </div>
        <button onClick={function(){
          try{localStorage.removeItem("team-selector-v1");}catch(e){}
          window.location.reload();
        }} style={{padding:"12px 24px",borderRadius:9,background:"#00ff88",color:"#080c10",border:"none",fontSize:15,fontWeight:800,cursor:"pointer"}}>
          Reset &amp; Reload
        </button>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.2)",marginTop:12}}>Profile database will be kept</div>
      </div>;
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary,null,React.createElement(App))
);
</script>
</body>
</html>
